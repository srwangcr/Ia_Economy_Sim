name: Database Integrity

on:
  pull_request:
  push:
    branches: [main]

jobs:
  migration-integrity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run migration roundtrip tests
        run: pytest tests/test_migrations.py -q

      - name: Apply latest migration on clean DB
        env:
          DATABASE_URL: sqlite:///ci_integrity.db
        run: alembic upgrade head

      - name: Run simulation and database tests
        env:
          DATABASE_URL: sqlite:///ci_integrity.db
        run: pytest tests/test_database.py tests/test_simulation.py tests/test_validation.py -q
